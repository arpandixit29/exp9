name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub (if secrets are configured)
        uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Build frontend image
        run: docker build -t my-react-app:latest ./client

      - name: Build backend image
        run: docker build -t my-node-app:latest ./server

      - name: Tag and Push frontend image (if logged in)
        if: secrets.DOCKERHUB_USERNAME != ''
        run: |
          docker tag my-react-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest
        continue-on-error: true

      - name: Tag and Push backend image (if logged in)
        if: secrets.DOCKERHUB_USERNAME != ''
        run: |
          docker tag my-node-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest
        continue-on-error: true
